# =====================================================================
#  YOUR JOB SEARCH PREFERENCES  —  edit anything here, then re-run
# =====================================================================

# Words that make an offer relevant (title matching, case-insensitive)
keywords:
  include:
    - product manager
    - project manager
    - program manager
    - product owner
    - product operations
    - chef de projet
    - product lead
    - pmo
    - business analyst
    - strategy

  # Bonus points if these appear (in the title or description)
  boost:
    - international
    - strategy
    - business development
    - growth
    - operations
    - junior
    - associate
    - graduate

  # Offers containing these in the title are dropped (tech + senior roles)
  exclude:
    # tech roles
    - software engineer
    - developer
    - devops
    - data scientist
    - machine learning
    - designer
    - technical product
    - engineering manager
    - qa
    - security
    - sre
    # too senior
    - staff
    - principal
    - senior
    - sr
    - director
    - head
    - vp
    - vice president
    - chief
    - expert
    - confirmé

# Where you want to work. Offers elsewhere are still shown but ranked lower.
