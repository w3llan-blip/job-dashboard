# Graduate / early-career programs worth tracking for a 2027 start.
# opens_month = month applications typically open (1-12). On the 1st of
# that month, the daily notification reminds you to go check.
# Dates are typical patterns from previous years — always verify on the page.

- program: APM (Associate Product Manager)
  company: Google
  url: https://www.google.com/about/careers/applications/jobs/results/?q=%22associate%20product%20manager%22
  opens_month: 8
  window: "Aug–Sep 2026 for the 2027 cohort"
  region: US / global
  fit: Product management (very selective, CS-friendly but open)

- program: APMM (Associate Product Marketing Manager)
  company: Google
  url: https://www.google.com/about/careers/applications/jobs/results/?q=%22associate%20product%20marketing%20manager%22
